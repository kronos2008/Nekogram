name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Cache Android
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/build-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: android-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            android-${{ runner.os }}

      - name: Grant permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --parallel --build-cache --configure-on-demand --daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseParallelGC"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: "**/*.apk"
